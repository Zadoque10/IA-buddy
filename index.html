<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Buddy</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <button id="btn-close" title="Fechar">✕</button>

  <div id="robot-wrap">
    <svg id="robot-svg" viewBox="0 0 200 295" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Glow filter para a antena -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <!-- Sombra suave nos olhos -->
        <filter id="eye-shadow">
          <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#3B82F6" flood-opacity="0.4"/>
        </filter>
        <!-- Gradiente corpo -->
        <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#DBEAFE"/>
          <stop offset="100%" stop-color="#BFDBFE"/>
        </linearGradient>
        <linearGradient id="head-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#EFF6FF"/>
          <stop offset="100%" stop-color="#DBEAFE"/>
        </linearGradient>
      </defs>

      <!-- ── Grupo principal (animado) ── -->
      <g id="robot-group" class="anim-float">

        <!-- Antena -->
        <line id="antenna-stem"
              x1="100" y1="26" x2="100" y2="50"
              stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>
        <circle id="antenna-glow"
                cx="100" cy="16" r="13"
                fill="#93C5FD" opacity="0.35" filter="url(#glow)"/>
        <circle id="antenna-ball"
                cx="100" cy="16" r="9"
                fill="#60A5FA" stroke="#BFDBFE" stroke-width="1.5"/>

        <!-- Orelhinhas / parafusos -->
        <circle cx="37" cy="88" r="7" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1.5"/>
        <circle cx="163" cy="88" r="7" fill="#BFDBFE" stroke="#60A5FA" stroke-width="1.5"/>

        <!-- Cabeça -->
        <rect id="head"
              x="40" y="48" width="120" height="100" rx="24"
              fill="url(#head-grad)" stroke="#60A5FA" stroke-width="2.5"/>

        <!-- ── Olho Esquerdo ── -->
        <g id="eye-group-l">
          <circle cx="74" cy="90" r="21"
                  fill="white" stroke="#93C5FD" stroke-width="2" filter="url(#eye-shadow)"/>
          <!-- pupils ficam dentro do eye group -->
          <g id="pupils-l">
            <circle id="pupil-l"  cx="74" cy="90" r="13" fill="#3B82F6"/>
            <circle id="iris-l"   cx="78" cy="86" r="5"  fill="white"/>
            <circle id="dot-l"    cx="79" cy="87" r="2"  fill="#1D4ED8"/>
          </g>
          <!-- Pálpebra esquerda -->
          <rect id="eyelid-l"
                x="53" y="69" width="42" height="0"
                rx="6" fill="url(#head-grad)"
                style="transform-origin: 74px 69px;"/>
        </g>

        <!-- ── Olho Direito ── -->
        <g id="eye-group-r">
          <circle cx="126" cy="90" r="21"
                  fill="white" stroke="#93C5FD" stroke-width="2" filter="url(#eye-shadow)"/>
          <g id="pupils-r">
            <circle id="pupil-r"  cx="126" cy="90" r="13" fill="#3B82F6"/>
            <circle id="iris-r"   cx="130" cy="86" r="5"  fill="white"/>
            <circle id="dot-r"    cx="131" cy="87" r="2"  fill="#1D4ED8"/>
          </g>
          <!-- Pálpebra direita -->
          <rect id="eyelid-r"
                x="105" y="69" width="42" height="0"
                rx="6" fill="url(#head-grad)"
                style="transform-origin: 126px 69px;"/>
        </g>

        <!-- Bochechas -->
        <ellipse id="blush-l" cx="52" cy="110" rx="12" ry="8" fill="#FCA5A5" opacity="0"/>
        <ellipse id="blush-r" cx="148" cy="110" rx="12" ry="8" fill="#FCA5A5" opacity="0"/>

        <!-- Boca -->
        <path id="mouth"
              d="M 80 118 Q 100 130 120 118"
              fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>

        <!-- Pescoço -->
        <rect x="84" y="148" width="32" height="16" rx="6"
              fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
        <!-- Listras pescoço -->
        <line x1="92" y1="148" x2="92" y2="164" stroke="#93C5FD" stroke-width="1.5"/>
        <line x1="100" y1="148" x2="100" y2="164" stroke="#93C5FD" stroke-width="1.5"/>
        <line x1="108" y1="148" x2="108" y2="164" stroke="#93C5FD" stroke-width="1.5"/>

        <!-- Corpo -->
        <rect id="body-rect"
              x="28" y="162" width="144" height="90" rx="22"
              fill="url(#body-grad)" stroke="#60A5FA" stroke-width="2.5"/>

        <!-- Painel do peito -->
        <rect x="56" y="174" width="88" height="62" rx="12"
              fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.8"/>

        <!-- Ícone do peito -->
        <text id="chest-icon"
              x="100" y="214"
              text-anchor="middle" dominant-baseline="middle"
              font-size="30" style="pointer-events:none;">🤖</text>

        <!-- Braço esquerdo -->
        <rect id="arm-l"
              x="4" y="168" width="26" height="66" rx="13"
              fill="url(#body-grad)" stroke="#60A5FA" stroke-width="2"
              style="transform-origin: 17px 168px;"/>
        <!-- Mão esquerda -->
        <circle cx="17" cy="241" r="13"
                fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>

        <!-- Braço direito -->
        <rect id="arm-r"
              x="170" y="168" width="26" height="66" rx="13"
              fill="url(#body-grad)" stroke="#60A5FA" stroke-width="2"
              style="transform-origin: 183px 168px;"/>
        <!-- Mão direita -->
        <circle cx="183" cy="241" r="13"
                fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>

        <!-- Perna esquerda -->
        <rect x="50" y="250" width="40" height="30" rx="12"
              fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>
        <!-- Perna direita -->
        <rect x="110" y="250" width="40" height="30" rx="12"
              fill="#BFDBFE" stroke="#60A5FA" stroke-width="2"/>

        <!-- Pé esquerdo -->
        <rect x="42" y="270" width="52" height="20" rx="10"
              fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
        <!-- Pé direito -->
        <rect x="106" y="270" width="52" height="20" rx="10"
              fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>

      </g><!-- /robot-group -->
    </svg>
  </div><!-- /robot-wrap -->

  <div id="status-label">Pronto!</div>
</div>

<script src="renderer.js"></script>
</body>
</html>
